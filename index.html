<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrefabContracts AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f1f5f9; /* Slate 100 */
      }
      
      /* A4 Paper Effect */
      .paper-a4 {
        width: 210mm;
        min-height: 297mm;
        height: auto; /* Allow growth */
        padding: 25mm 20mm;
        margin: 2rem auto;
        background: white;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 20px rgba(0,0,0,0.05);
        position: relative;
        font-family: 'Times New Roman', Times, serif; /* Legal Font */
        color: #000;
        overflow: visible; /* CRITICAL FIX: Show all text */
      }

      /* Watermark Style */
      .watermark-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.08;
        pointer-events: none;
        z-index: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      
      .watermark-container svg {
        width: 80%;
        height: 80%;
      }

      .contract-content {
        position: relative;
        z-index: 10;
      }
      
      @media print {
        @page {
          margin: 0;
          size: A4;
        }
        body * {
          visibility: hidden;
        }
        .paper-a4, .paper-a4 * {
          visibility: visible;
        }
        .paper-a4 {
          /* CRITICAL FIX FOR TEXT CUTTING */
          position: relative !important; 
          width: 100%;
          min-height: 100vh;
          margin: 0;
          padding: 35mm 20mm 30mm 20mm; /* Extra padding top/bottom for header/footer */
          box-shadow: none;
          background: white !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
          overflow: visible !important;
          height: auto !important;
          page-break-inside: auto;
        }
        
        /* Ensure paragraphs don't split awkwardly */
        p, li, h1, h2, h3 {
          page-break-inside: avoid;
          orphans: 3;
          widows: 3;
        }

        .watermark-container {
          opacity: 0.05 !important;
          position: fixed; /* Repeat on every page */
          top: 0;
          left: 0;
          width: 100%;
          height: 100vh;
          z-index: -1;
        }
        .no-print {
          display: none !important;
        }
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
</head>
  <body class="text-slate-900 antialiased overflow-hidden">
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
